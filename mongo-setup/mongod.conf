# mongod.conf — MongoDB 7.0 config for the BMT MongoDB-on-VM backend (VM2).
#
# Canonical YAML for the single-node replica-set target. The realized VM2 in this
# environment is Windows Server 2025, where mongod reads this file as:
#   C:\Program Files\MongoDB\Server\7.0\bin\mongod.cfg
# On Linux the equivalent path is /etc/mongod.conf and dbPath would be /mnt/data/mongo.
#
# Settings required by the project spec:
#   net.bindIp 0.0.0.0 / port 27017 / maxIncomingConnections 5000
#   replication.replSetName rs0
#   security.authorization enabled (+ keyFile for replica-set internal auth)
#   storage.dbPath on the dedicated 512 GB data disk
# WiredTiger cache is intentionally left at default (~50% RAM). Do NOT set
# storage.wiredTiger.engineConfig.cacheSizeGB.

storage:
  # Windows (realized): E:\mongo\data   |   Linux (spec): /mnt/data/mongo
  dbPath: E:\mongo\data

systemLog:
  destination: file
  logAppend: true
  path: E:\mongo\log\mongod.log

net:
  port: 27017
  bindIp: 0.0.0.0
  maxIncomingConnections: 5000

security:
  authorization: enabled
  # Required for auth on a replica set (internal member auth). Restrict file ACLs
  # to the mongod service account only.
  keyFile: E:\mongo\keyfile

replication:
  replSetName: rs0
